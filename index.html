<!DOCTYPE html>

<html class="dark" lang="es">

<head>

    <title>Storebass | Colecciona lo que te representa</title>
    <meta name="description"

    <meta name="keywords" content="Storebass, pines, llaveros, gorras, accesorios urbanos, streetwear Colombia" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link

        rel="stylesheet" />

            HOLA

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .topographic-bg {
            position: relative;
        }

        .topographic-bg::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/topography.png");
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
        }

        body {
            color: #e3e2e4;
        }

        h1,
        h2,
        h3,
        h4,
        .font-display-xl,
        .font-headline-lg,
        .font-headline-lg-mobile {
            font-family: 'Anton', sans-serif !important;
            text-transform: uppercase;
        }

        .font-title-md {
            font-family: 'Hanken Grotesk', sans-serif !important;
        }

        .font-label-sm {
            font-family: 'Geist', sans-serif !important;
        }

        p,
        span,
        div:not(.font-headline-lg):not(.font-display-xl):not(.font-headline-lg-mobile):not(.font-title-md):not(.font-label-sm),
        a:not(.font-headline-lg):not(.font-display-xl):not(.font-headline-lg-mobile):not(.font-title-md):not(.font-label-sm) {
            font-family: 'Hanken Grotesk', sans-serif;
        }
    </style>

<body class="bg-background text-white font-body-base antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
